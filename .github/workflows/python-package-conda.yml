name: Shared Python Toolchain Conda

on:
  push:
    paths:
      - ".github/workflows/python-package-conda.yml"
      - "Shared-Python-Toolchain/**"
  pull_request:
    paths:
      - ".github/workflows/python-package-conda.yml"
      - "Shared-Python-Toolchain/**"

jobs:
  toolchain-conda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Shared-Python-Toolchain
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: security-gateway
          environment-file: Shared-Python-Toolchain/conda.yml
          auto-activate-base: false
          python-version: "3.13"

      - name: Install toolchain package
        run: python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python scripts/run_pytest.py --timeout-seconds 900 -- tests -q
